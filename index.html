<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Dog Overlay</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
}

#overlay{
    position:relative;
    width:100vw;
    height:100vh;
}

.pet{
    position:absolute;
    bottom:30px;
    width:90px;
    user-select:none;
    pointer-events:none;
    transition:transform .2s linear;
}

.pet img{
    width:100%;
    display:block;
}

.bubble{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:100%;
    margin-bottom:8px;
    background:white;
    color:#111;
    border-radius:12px;
    padding:6px 10px;
    font-size:18px;
    font-weight:bold;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
}
</style>
</head>

<body>

<div id="overlay"></div>

<script src="config.js"></script>
<script src="chat.js"></script>

</body>
</html>
