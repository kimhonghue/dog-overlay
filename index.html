<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:transparent;">

<script>

function createDog(name, message){

  const dogBox = document.createElement("div");

  dogBox.style.position = "absolute";
  dogBox.style.bottom = "20px";
  dogBox.style.left = Math.random() * 800 + "px";

  dogBox.innerHTML = `
    <div style="
      background:white;
      border-radius:15px;
      padding:8px 12px;
      font-size:16px;
      text-align:center;
      margin-bottom:5px;
    ">
      <b>${name}</b><br>
      ${message}
    </div>

    <img class="dog"
    src="dog1.png"
    width="250">
  `;

  document.body.appendChild(dogBox);


  let frame = 1;
  const img = dogBox.querySelector(".dog");


  const animation = setInterval(()=>{

    frame++;

    if(frame > 20){
      frame = 1;
    }

    img.src = "dog" + frame + ".png";

  },150);


  let x = parseInt(dogBox.style.left);


  const move = setInterval(()=>{

    x += 2;
    dogBox.style.left = x+"px";

  },30);


  setTimeout(()=>{

    clearInterval(animation);
    clearInterval(move);
    dogBox.remove();

  },10000);

}




</script>
<script src="config.js"></script>
<script src="chat.js"></script>
</body>
</html>
